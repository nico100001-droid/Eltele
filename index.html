<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EL TELE</title>
    <meta name="referrer" content="no-referrer" />
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .caja { 
            background: #222; height: 120px; display: flex; align-items: center; 
            justify-content: center; border-radius: 10px; cursor: pointer; 
            font-size: 20px; border: 2px solid #444; text-align: center; padding: 10px; 
            transition: all 0.3s;
        }
        .caja:focus, .caja:hover { background: blue; border-color: #fff; outline: none; transform: scale(1.05); }
        
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        #player-container iframe { width: 100%; height: 100%; border: none; }
        
        .controles-zapping { position: absolute; z-index: 101; right: 20px; top: 20px; display: flex; gap: 10px; }
        .btn-zapping { background: rgba(80, 80, 80, 0.8); color: white; padding: 10px 15px; border: 1px solid #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-cerrar { background: rgba(255, 0, 0, 0.8); color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        #video-titulo {
            position: absolute; bottom: 20px; left: 20px; z-index: 101;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 5px;
            font-size: 18px; pointer-events: none; transition: opacity 1s;
        }
    </style>
</head>
<body>

<h1 style="text-align:center; color:#666;">EL TELE</h1>
<div class="grid" id="grid-canales"></div>

<div id="player-container">
    <div id="video-titulo"></div>
    <div class="controles-zapping">
        <button id="btn-otra-fuente" class="btn-zapping" style="background: orange; display: none;" onclick="forzarSiguienteFuente()"> F </button>
        <button class="btn-zapping" onclick="cambiarCanal(-1)">◀CH</button>
        <button class="btn-zapping" onclick="cambiarCanal(1)">CH▶</button>
        <button class="btn-cerrar" onclick="cerrarPlayer()">X</button>
    </div>
    <video id="my-video" class="video-js vjs-default-skin" controls style="width:100%; height:100%;"></video>
</div>
    
<div id="eltele-navigation" style="position: fixed; top: 10px; left: 10px; z-index: 9999; font-family: Arial, sans-serif;">
    <button onclick="toggleElteleMenu()" id="eltele-btn" style="
        background-color: rgba(30, 30, 30, 0.9);
        color: #00ffcc;
        border: 2px solid #444;
        border-radius: 8px;
        padding: 5px 15px;
        font-size: 12px;
        cursor: pointer;
        outline: none;
    ">peli/serie ▼</button>

    <ul id="eltele-dropdown" style="
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background-color: rgb(30, 30, 30);
        border: 2px solid #444;
        border-radius: 8px;
        list-style: none;
        padding: 5px 0;
        margin: 5px 0 0 0;
        min-width: 150px;
    ">
        <li><a href="index.html" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">🏠 Inicio ELTELE</a></li>
        <li><a href="https://ww3.animeonline.ninja/inicio/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 Anime</a></li>
        <li><a href="https://www3.seriesmetro.net/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 series metro</a></li>
        <li><a href="https://www.poseidonhd2.co/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 Peli poseidon</a></li>
        <li><a href="https://www.cuevana8.plus/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 cuevana 1</a></li>
        <li><a href="https://www.peelink2.com/inicio" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 Peelink</a></li>
        <li><a href="https://repelishd.run/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 repelis</a></li>
        <li><a href="https://pelicinehd.com/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 pelicine</a></li>
        <li><a href="https://tvlibre-online.com/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 TVlibre</a></li>
        <li><a href="https://tele-libre.fans/" style="display:block; padding:8px 15px; color:#00ffcc; text-decoration:none; font-size:12px;">📂 TeleLibre</a></li>
    </ul>
</div>

<script>
function toggleElteleMenu() {
    var menu = document.getElementById("eltele-dropdown");
    if (menu.style.display === "none" || menu.style.display === "") {
        menu.style.display = "block";
    } else {
        menu.style.display = "none";
    }
}

// Cierra el menú si se hace clic fuera (opcional, para navegación con puntero)
window.onclick = function(event) {
    if (!event.target.matches('#eltele-btn')) {
        var dropdown = document.getElementById("eltele-dropdown");
        if (dropdown.style.display === "block") {
            dropdown.style.display = "none";
        }
    }
}
</script>
    
</div>
    
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="canales.js"></script>
<script src="SimpsonsTV.js"></script>
<script src="DibusNico.js"></script>
<script src="harry.js"></script>
<script src="digi.js"></script>
<script src="boys.js"></script>

<script>
let player;
let indiceActual = 0;
let indiceFuenteActual = 0;

window.onload = function() {
    const g = document.getElementById('grid-canales');
    if (typeof listaCanales === 'undefined') {
        alert("Error: No se encontró la lista de canales en canales.js");
        return;
    }

    listaCanales.forEach((c, index) => {
        const d = document.createElement('div');
        d.className = 'caja';
        d.innerText = c.nombre;
        d.tabIndex = 0;
        d.onclick = () => {
            indiceActual = index;
            indiceFuenteActual = 0;
            cargarCanal(listaCanales[indiceActual]);
        };
        g.appendChild(d);
    });
};

function aplanarContenido(objetoSerie) {
    let listaPlana = [];
    for (let serie in objetoSerie) {
        for (let temporada in objetoSerie[serie]) {
            objetoSerie[serie][temporada].forEach(ep => {
                listaPlana.push({
                    url: ep.url,
                    tipo: 'mp4',
                    titulo: ep.title
                });
            });
        }
    }
    return listaPlana;
}

function forzarSiguienteFuente() {
    const canalActual = listaCanales[indiceActual];
    const fuenteBase = canalActual.fuentes[0];
    let limite = canalActual.fuentes.length;

    if (fuenteBase.url === "FUENTES") {
        if (canalActual.nombre === "DIGI") {
            limite = aplanarContenido(digi).length;
        } else if (canalActual.nombre === "BOYS") {
            limite = aplanarContenido(boys).length;
        }
    }
    indiceFuenteActual++;
    if (indiceFuenteActual >= limite) indiceFuenteActual = 0;
    cargarCanal(canalActual);
}

async function cargarCanal(c) {
    const pc = document.getElementById('player-container');
    const vid = document.getElementById('my-video');
    const btnFuente = document.getElementById('btn-otra-fuente');
    const txtTitulo = document.getElementById('video-titulo');
    const iframeViejo = document.getElementById('ifrm');
    
    if(iframeViejo) iframeViejo.remove();
    pc.style.display = 'block';
    txtTitulo.innerText = c.nombre;

    let videoParaReproducir = null;
    const fuenteConfig = c.fuentes[0];

    if (fuenteConfig.url === "ALEATORIO") {
        if (c.nombre === "SIMPSONS TV") videoParaReproducir = obtenerCapituloAleatorio(listaSimpsons);
        else if (c.nombre === "DIBUS TV") videoParaReproducir = obtenerCapituloAleatorio(listaDibusNico);
        else if (c.nombre === "HARRY") videoParaReproducir = obtenerCapituloAleatorio(listaharry);
        
        btnFuente.style.display = 'none';
    } 
    else if (fuenteConfig.url === "FUENTES") {
        let listaPlana = [];
        if (c.nombre === "DIGI") listaPlana = aplanarContenido(digi);
        else if (c.nombre === "BOYS") listaPlana = aplanarContenido(boys);
        
        videoParaReproducir = listaPlana[indiceFuenteActual];
        btnFuente.style.display = 'inline-block';
        btnFuente.innerText = `EP ${indiceFuenteActual + 1} / ${listaPlana.length}`;
        txtTitulo.innerText = `${c.nombre}: ${videoParaReproducir.titulo}`;
    } 
    else {
        videoParaReproducir = c.fuentes[indiceFuenteActual] || c.fuentes[0];
        if (c.fuentes.length > 1) {
            btnFuente.style.display = 'inline-block';
            btnFuente.innerText = `♻ ${indiceFuenteActual + 1} de ${c.fuentes.length}`;
        } else {
            btnFuente.style.display = 'none';
        }
    }

    if (!videoParaReproducir || !videoParaReproducir.url) return;

    const urlFinal = videoParaReproducir.url;
    const tipoFuente = videoParaReproducir.tipo;

    if (player) { player.off('error'); player.pause(); }

    if(tipoFuente === 'hls' || urlFinal.includes('m3u8') || urlFinal.toLowerCase().includes('.mp4')) {
        vid.style.display = 'block';
        if (!player) player = videojs('my-video');
        
        let mimeType = urlFinal.includes('m3u8') ? 'application/x-mpegURL' : 'video/mp4';
        player.src({ src: urlFinal, type: mimeType });
        
        player.one('ended', () => { 
            if (fuenteConfig.url === "FUENTES") forzarSiguienteFuente(); 
            else cargarCanal(c); 
        });

        player.on('error', () => intentarSiguienteFuente(c));
        
        // CORRECCIÓN MUTEADO: Forzar desmuteado e interacción de volumen limpia post-play
        player.play()
            .then(() => {
                player.muted(false);
                player.volume(1.0);
            })
            .catch(() => { 
                // Fallback obligatorio del navegador si bloquea audio sin clic previo
                player.muted(true); 
                player.play(); 
            });
    } else {
        vid.style.display = 'none';
        if (player) player.pause();
        
        const ifrm = document.createElement('iframe');
        ifrm.id = 'ifrm';
        
        let srcIframe = urlFinal;

        if (srcIframe.includes('youtube.com') || srcIframe.includes('youtube-nocookie.com')) {
            if (srcIframe.includes('watch?v=')) {
                const videoId = srcIframe.split('v=')[1].split('&')[0];
                srcIframe = `https://www.youtube-nocookie.com/embed/${videoId}`;
            }
            const connector = srcIframe.includes('?') ? '&' : '?';
            const origin = window.location.protocol + "//" + window.location.host;
            srcIframe += `${connector}autoplay=1&rel=0&enablejsapi=1&origin=${encodeURIComponent(origin)}`;
        }

        ifrm.src = srcIframe;
        ifrm.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        ifrm.setAttribute('allowfullscreen', 'true');
        
        // CORRECCIÓN IFRAMES POPUPS: Sandbox estricto contra nuevas pestañas o redirecciones
        // Mantiene scripts y mismo origen para reproducir, bloquea popups y navegación superior.
        ifrm.setAttribute('sa', 'al');
        
        pc.appendChild(ifrm);
    }
}

function intentarSiguienteFuente(canal) {
    if (canal.fuentes && indiceFuenteActual < canal.fuentes.length - 1) {
        indiceFuenteActual++;
        cargarCanal(canal);
    }
}

function cambiarCanal(direccion) {
    indiceActual += direccion;
    indiceFuenteActual = 0;
    if (indiceActual >= listaCanales.length) indiceActual = 0;
    if (indiceActual < 0) indiceActual = listaCanales.length - 1;
    cargarCanal(listaCanales[indiceActual]);
}

function cerrarPlayer() { location.reload(); }

function obtenerCapituloAleatorio(lista) {
    if (!lista || lista.length === 0) return null;
    return lista[Math.floor(Math.random() * lista.length)];
}

document.addEventListener('keydown', function(e) {
    const pc = document.getElementById('player-container');
    if (pc.style.display !== 'block') return;
    switch(e.keyCode) {
        case 33: case 38: case 427: e.preventDefault(); cambiarCanal(-1); break;
        case 34: case 40: case 428: e.preventDefault(); cambiarCanal(1); break;
        case 27: case 8: case 461: e.preventDefault(); cerrarPlayer(); break;
    }
});
</script>
</body>
</html>
