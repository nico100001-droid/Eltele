<!DOCTYPE html>
<html>
<head>
<title>EL TELE</title>
<meta name="referrer" content="no-referrer" />
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
<style>
body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
.caja { background: #222; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; font-size: 20px; border: 2px solid #444; text-align: center; padding: 10px; }
.caja:focus, .caja:hover { background: blue; border-color: #fff; outline: none; }
#player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
#player-container iframe { width: 100%; height: 100%; border: none; }
.controles-zapping { position: absolute; z-index: 101; right: 20px; top: 20px; display: flex; gap: 10px; }
.btn-zapping { background: rgba(80, 80, 80, 0.8); color: white; padding: 10px 15px; border: 1px solid #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }
.btn-cerrar { background: rgba(255, 0, 0, 0.8); color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
</style>
</head>
<body>

<h1 style="text-align:center; color:#666;">EL TELE</h1>
<div class="grid" id="grid-canales"></div>

<div id="player-container">
    <div class="controles-zapping">
        <button class="btn-zapping" onclick="cambiarCanal(-1)">◀ CH</button>
        <button class="btn-zapping" onclick="cambiarCanal(1)">CH ▶</button>
        <button class="btn-cerrar" onclick="cerrarPlayer()">X</button>
    </div>
    <video id="my-video" class="video-js vjs-default-skin" controls style="width:100%; height:100%;"></video>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="canales.js"></script>
<script src="SimpsonsTV.js"></script>
<script src="DibusNico.js"></script>
    
<script>
let player;
let indiceActual = 0;

window.onload = function() {
    const g = document.getElementById('grid-canales');
    if (typeof listaCanales === 'undefined') {
        alert("Error: No se encontró la lista de canales en canales.js");
        return;
    }

    listaCanales.forEach((c, index) => {
        const d = document.createElement('div');
        d.className = 'caja';
        d.innerText = c.nombre;
        d.tabIndex = 0;
        d.onclick = () => {
            indiceActual = index;
            cargarCanal(listaCanales[indiceActual]);
        };
        g.appendChild(d);
    });
};

function obtenerCapituloAleatorio(lista) {
    if (typeof lista === 'undefined' || lista.length === 0) return null;
    const indiceSorteado = Math.floor(Math.random() * lista.length);
    return lista[indiceSorteado];
}

async function cargarCanal(c) {
    const pc = document.getElementById('player-container');
    const vid = document.getElementById('my-video');
    const iframeViejo = document.getElementById('ifrm');
    if(iframeViejo) iframeViejo.remove();
    
    pc.style.display = 'block';

    let videoParaReproducir = c;
    
    if(c.nombre === "SIMPSONS TV") {
        videoParaReproducir = obtenerCapituloAleatorio(listaSimpsons);
    } 
    else if(c.nombre === "DIBUS TV") {
        videoParaReproducir = obtenerCapituloAleatorio(listaDibusNico); 
    }

    // SI NO HAY VIDEO PARA REPRODUCIR, SALIR
    if (!videoParaReproducir || !videoParaReproducir.url) return;

    // 2. CASO M3U8 (Basado en el video sorteado)
    if(videoParaReproducir.url.includes('m3u8')) {
        vid.style.display = 'block';
        if (!player) player = videojs('my-video');
        player.src({ src: videoParaReproducir.url, type: 'application/x-mpegURL' });
        player.play();
    } 
    // 3. CASO MP4 (Basado en el video sorteado)
else if(videoParaReproducir.url.toLowerCase().includes('.mp4')) {
    vid.style.display = 'block';

    if (!player) {
        player = videojs('my-video', {
            autoplay: true,
            preload: 'auto'
        });
    }

    player.pause();

    let urlFinal = videoParaReproducir.url;

    player.src({ src: urlFinal, type: 'video/mp4' });
    player.load();

    const promise = player.play();
    if (promise !== undefined) {
        promise.catch(() => {
            player.muted(true);
            player.play();
        });
    }

    // 🔥 FALLBACK SI FALLA
    player.off('error');
    player.on('error', function() {
        console.log("MP4 falló, usando iframe");

        vid.style.display = 'none';
        player.pause();

        const ifrm = document.createElement('iframe');
        ifrm.id = 'ifrm';
        ifrm.src = urlFinal;
        ifrm.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-presentation');
        ifrm.allow = "autoplay; encrypted-media; fullscreen";
        ifrm.setAttribute('allowfullscreen', 'true');

        document.getElementById('player-container').appendChild(ifrm);
    });

    // Evento fin
    player.off('ended');
    player.on('ended', function() {
        if(c.nombre === "SIMPSONS TV" || c.nombre === "DIBUS TV") {
            cargarCanal(c); 
        } else {
            cambiarCanal(1);
        }
    });
}
    // 4. CASO IFRAME (Cualquier otro enlace)
    else {
        vid.style.display = 'none';
        if (player) player.pause();
        const ifrm = document.createElement('iframe');
        ifrm.id = 'ifrm';
        let urlFinal = videoParaReproducir.url;
        if(urlFinal.includes('youtube.com/watch?v=')) {
            urlFinal = urlFinal.replace('watch?v=', 'embed/');
        }
        ifrm.src = urlFinal;
        ifrm.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-presentation');
        ifrm.allow = "autoplay; encrypted-media; fullscreen";
        ifrm.setAttribute('allowfullscreen', 'true');
        pc.appendChild(ifrm);
    }
}

function cambiarCanal(direccion) {
    indiceActual += direccion;
    if (indiceActual >= listaCanales.length) indiceActual = 0;
    if (indiceActual < 0) indiceActual = listaCanales.length - 1;
    cargarCanal(listaCanales[indiceActual]);
}

function cerrarPlayer() {
    location.reload();
}

document.addEventListener('keydown', function(e) {
    const pc = document.getElementById('player-container');
    if (pc.style.display !== 'block') return;

    switch(e.keyCode) {
        case 33: case 38: case 427:
            e.preventDefault();
            cambiarCanal(-1);
            break;
        case 34: case 40: case 428:
            e.preventDefault();
            cambiarCanal(1);
            break;
        case 27: case 8: case 461:
            e.preventDefault();
            cerrarPlayer();
            break;
    }
});
    const cacheArchive = {};

async function resolverArchive(url) {
    if (cacheArchive[url]) return cacheArchive[url];

    try {
        const response = await fetch(url, {
            method: 'GET',
            redirect: 'follow'
        });

        cacheArchive[url] = response.url;
        return response.url;
    } catch (e) {
        console.log("Error resolviendo archive:", e);
        return url;
    }
}
</script>
</body>
</html>
