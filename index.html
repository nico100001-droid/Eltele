<!DOCTYPE html>
<html>
<head>
<title>EL TELE</title>
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
<style>
body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
.caja { background: #222; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; font-size: 20px; border: 2px solid #444; text-align: center; padding: 10px; }
.caja:focus, .caja:hover { background: blue; border-color: #fff; outline: none; }
#player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
.controles-zapping { position: absolute; z-index: 101; right: 20px; top: 20px; display: flex; gap: 10px; }
.btn-zapping { background: rgba(80, 80, 80, 0.8); color: white; padding: 10px 15px; border: 1px solid #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }
.btn-cerrar { background: rgba(255, 0, 0, 0.8); color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
#my-video { width: 100%; height: 100%; }
</style>
</head>
<body>

<h1 style="text-align:center; color:#666;">EL TELE</h1>
<div class="grid" id="grid-canales"></div>

<div id="player-container">
    <div class="controles-zapping">
        <button class="btn-zapping" onclick="cambiarCanal(-1)">◀ CH</button>
        <button class="btn-zapping" onclick="cambiarCanal(1)">CH ▶</button>
        <button class="btn-cerrar" onclick="cerrarPlayer()">X</button>
    </div>
    <video id="my-video" class="video-js vjs-default-skin" controls preload="auto"></video>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="canales.js"></script>
<script src="SimpsonsTV.js"></script>

<script>
let player;
let indiceActual = 0;

window.onload = function() {
    const g = document.getElementById('grid-canales');
    if (typeof listaCanales === 'undefined') {
        alert("Error: No se encontró la lista de canales en canales.js");
        return;
    }

    listaCanales.forEach((c, index) => {
        const d = document.createElement('div');
        d.className = 'caja';
        d.innerText = c.nombre;
        d.tabIndex = 0;
        d.onclick = () => {
            indiceActual = index;
            cargarCanal(listaCanales[indiceActual]);
        };
        g.appendChild(d);
    });
};

function obtenerCapituloAleatorio() {
    if (typeof listaSimpsons === 'undefined' || listaSimpsons.length === 0) return null;
    const indiceSorteado = Math.floor(Math.random() * listaSimpsons.length);
    return listaSimpsons[indiceSorteado];
}

function cargarCanal(c) {
    const pc = document.getElementById('player-container');
    pc.style.display = 'block';

    // 1. Determinar el video a reproducir
    let videoParaReproducir = c;
    if(c.nombre === "SIMPSONS TV") {
        videoParaReproducir = obtenerCapituloAleatorio();
    }

    // 2. Inicializar Video.js si no existe
    if (!player) {
        player = videojs('my-video');
    }

    // 3. Lógica de carga según extensión
    let tipo = "";
    if (videoParaReproducir.url.includes('m3u8')) {
        tipo = 'application/x-mpegURL';
    } else if (videoParaReproducir.url.includes('.mp4')) {
        tipo = 'video/mp4';
    }

    if (tipo !== "") {
        player.src({ src: videoParaReproducir.url, type: tipo });
        player.play();

        // 4. Manejo del final del video
        player.off('ended');
        player.on('ended', function() {
            if(c.nombre === "SIMPSONS TV") {
                cargarCanal(c); // Sortea otro capítulo
            } else {
                cambiarCanal(1); // Salta al siguiente canal de la lista
            }
        });
    } else {
        console.error("Formato no soportado para: " + videoParaReproducir.url);
    }
}

function cambiarCanal(direccion) {
    indiceActual += direccion;
    if (indiceActual >= listaCanales.length) indiceActual = 0;
    if (indiceActual < 0) indiceActual = listaCanales.length - 1;
    cargarCanal(listaCanales[indiceActual]);
}

function cerrarPlayer() {
    location.reload();
}

document.addEventListener('keydown', function(e) {
    const pc = document.getElementById('player-container');
    if (pc.style.display !== 'block') return;

    switch(e.keyCode) {
        case 33: case 38: case 427: // Arriba / CH+
            e.preventDefault();
            cambiarCanal(-1);
            break;
        case 34: case 40: case 428: // Abajo / CH-
            e.preventDefault();
            cambiarCanal(1);
            break;
        case 27: case 8: case 461:  // Salir / Back
            e.preventDefault();
            cerrarPlayer();
            break;
    }
});
</script>
</body>
</html>
